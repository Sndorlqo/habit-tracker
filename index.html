<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habit Tracker</title>

<style>
body { font-family: sans-serif; padding: 20px; }
.habit { margin-bottom: 15px; }
.days { display: flex; gap: 5px; flex-wrap: wrap; }
</style>
</head>

<body>

<h2>Habit Tracker</h2>
<div id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxvRzsVPGmnYK62Mnj2PX0uek_TkB1UkGwN-yJzvDkGWDNR_n7ZIHa2_6o7j-k5Glxs/exec";

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    const app = document.getElementById("app");

    // 습관 부분만 가져오기 (9행부터)
    const habits = data.slice(8, 20);

    habits.forEach(row => {
      const habitName = row[0];

      const div = document.createElement("div");
      div.className = "habit";

      const title = document.createElement("div");
      title.innerText = habitName;

      const days = document.createElement("div");
      days.className = "days";

      // 1~31일 체크박스 생성
      for (let i = 1; i <= 31; i++) {
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";

        days.appendChild(checkbox);
      }

      div.appendChild(title);
      div.appendChild(days);
      app.appendChild(div);
    });
  });
</script>

</body>
</html>
