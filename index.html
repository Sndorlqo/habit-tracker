<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habit Tracker</title>
<style>
body { font-family: sans-serif; padding: 20px; }
.card { border: 1px solid #ddd; margin: 10px 0; padding: 10px; }
</style>
</head>

<body>

<h2>Habit Tracker</h2>
<div id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxvRzsVPGmnYK62Mnj2PX0uek_TkB1UkGwN-yJzvDkGWDNR_n7ZIHa2_6o7j-k5Glxs/exec";

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    const app = document.getElementById("app");

    data.slice(8, 20).forEach(row => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerText = row[0];
      app.appendChild(div);
    });
  });
</script>

</body>
</html>
